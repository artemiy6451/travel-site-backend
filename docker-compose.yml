services:

  travelvv:
    container_name: travelvv
    restart: always

    network_mode: host

    build:
      context: .
      dockerfile: Dockerfile

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - ./logs:/app/logs
      - ./static:/app/static

    logging:
      driver: json-file
      options:
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"
